<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>E-RECETA DENTAL — Clínica Sonrisa Ideal</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
<style>
  :root{
    --naranja:#e8650a;--naranja-claro:#f59340;--naranja-suave:#fff5ed;
    --gris:#f9f7f5;--borde:#ede8e3;--texto:#1a1410;--texto-suave:#7a6e65;
    --sombra:0 2px 16px rgba(232,101,10,.10);
    --rojo:#c0392b;--rojo-suave:#fff0ee;--rojo-borde:#f5c6c2;
    --amarillo:#b45309;--amarillo-suave:#fffbeb;--amarillo-borde:#fde68a;
    --verde:#166534;--verde-suave:#f0fdf4;--verde-borde:#bbf7d0;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Sans',sans-serif;color:var(--texto);background:#f5f0ec;min-height:100vh}
  header{background:#fff;border-bottom:3px solid var(--naranja);padding:14px 24px;display:flex;justify-content:center;align-items:center;box-shadow:0 2px 12px rgba(0,0,0,.06)}
  .header-brand{display:flex;flex-direction:column;gap:4px;align-items:center;flex:1;text-align:center}.header-brand img{height:60px;object-fit:contain}
  .header-title{font-family:'Playfair Display',serif;font-size:clamp(17px,2.5vw,24px);font-weight:800;color:var(--naranja);letter-spacing:.2px}
  .header-sub{font-size:12px;color:var(--texto-suave);font-weight:500;letter-spacing:.8px;text-transform:uppercase}
  main{max-width:1020px;margin:0 auto;padding:24px 16px 60px}
  .card{background:#fff;border:1px solid var(--borde);border-radius:16px;box-shadow:var(--sombra);padding:20px 22px;margin-bottom:16px}
  .card-title{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;color:var(--naranja);margin-bottom:14px;display:flex;align-items:center;gap:8px}
  .card-title::before{content:'';display:block;width:4px;height:18px;background:var(--naranja);border-radius:4px}
  .controls{display:flex;flex-wrap:wrap;gap:12px}
  .controls > div{flex:1 1 190px}
  label.field-label{display:block;font-size:12px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--texto-suave);margin-bottom:6px}
  input[type="text"],input[type="date"]{width:100%;padding:10px 14px;border:1.5px solid var(--borde);border-radius:10px;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s,box-shadow .2s;background:#fdfcfb;color:var(--texto)}
  input[type="text"]:focus,input[type="date"]:focus{border-color:var(--naranja);box-shadow:0 0 0 3px rgba(232,101,10,.12)}

  /* PERFILES */
  .perfiles-label{font-size:11px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;color:var(--texto-suave);margin-bottom:8px}
  .perfiles-bar{display:flex;flex-wrap:wrap;gap:8px}
  .perfil-btn{border:2px solid;border-radius:999px;font-family:'DM Sans',sans-serif;font-weight:700;font-size:12.5px;padding:7px 16px;cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:6px;background:#fff}
  .perfil-btn .dot{width:9px;height:9px;border-radius:50%;display:inline-block;flex-shrink:0}
  .perfil-btn.p-alergico{color:#7c3aed;border-color:#7c3aed}.perfil-btn.p-alergico.active{background:#7c3aed;color:#fff}.perfil-btn.p-alergico .dot{background:#7c3aed}
  .perfil-btn.p-hipertenso{color:#1d4ed8;border-color:#1d4ed8}.perfil-btn.p-hipertenso.active{background:#1d4ed8;color:#fff}.perfil-btn.p-hipertenso .dot{background:#1d4ed8}
  .perfil-btn.p-diabetico{color:#d97706;border-color:#d97706}.perfil-btn.p-diabetico.active{background:#d97706;color:#fff}.perfil-btn.p-diabetico .dot{background:#d97706}
  .perfil-btn.p-renal{color:#0e7490;border-color:#0e7490}.perfil-btn.p-renal.active{background:#0e7490;color:#fff}.perfil-btn.p-renal .dot{background:#0e7490}
  .perfil-btn:hover{opacity:.82;transform:translateY(-1px)}

  /* ALERTAS GLOBALES */
  #alertasGlobales{margin-top:12px}
  .alerta-box{border-radius:12px;padding:11px 14px;margin-bottom:8px;display:flex;gap:10px;align-items:flex-start;font-size:13px;line-height:1.5;animation:fadeIn .22s ease}
  @keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
  .alerta-box.tipo-error{background:var(--rojo-suave);border:1.5px solid var(--rojo-borde);color:#7f1d1d}
  .alerta-box.tipo-warning{background:var(--amarillo-suave);border:1.5px solid var(--amarillo-borde);color:#78350f}
  .alerta-box.tipo-info{background:var(--verde-suave);border:1.5px solid var(--verde-borde);color:#14532d}
  .alerta-icon{font-size:15px;margin-top:1px;flex-shrink:0}
  .alerta-txt strong{display:block;font-size:12.5px;margin-bottom:2px}

  /* MEDICAMENTOS */
  .meds{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  @media(max-width:540px){.meds{grid-template-columns:1fr}}
  .med{background:var(--gris);border:1.5px solid var(--borde);border-radius:12px;padding:12px 14px 12px 12px;display:flex;gap:10px;align-items:flex-start;cursor:pointer;transition:border-color .18s,background .18s,box-shadow .18s,opacity .18s;position:relative;overflow:visible}
  .med:hover:not(.bloqueado){border-color:var(--naranja-claro);background:#fff9f4}
  .med input[type="checkbox"]{accent-color:var(--naranja);width:17px;height:17px;margin-top:3px;flex-shrink:0;cursor:pointer}
  .med.checked{border-color:var(--naranja);background:#fff5ed;box-shadow:0 0 0 2px rgba(232,101,10,.10)}
  .med-nombre{font-weight:700;font-size:14px;color:var(--texto)}
  .med-indic{font-size:12.5px;color:var(--texto-suave);margin-top:2px}
  .med.bloqueado{opacity:.55;cursor:not-allowed;background:#fff0ee !important;border-color:var(--rojo-borde) !important}
  .med.bloqueado input{pointer-events:none;cursor:not-allowed}
  .med.advertencia{border-color:var(--amarillo-borde) !important;background:var(--amarillo-suave) !important}
  .med.info-alerta{border-color:var(--verde-borde) !important;background:var(--verde-suave) !important}
  .med-alerta-badge{position:absolute;top:7px;right:8px;font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:999px;pointer-events:none;white-space:nowrap}
  .badge-error{background:#fca5a5;color:#7f1d1d}
  .badge-warning{background:#fde68a;color:#78350f}
  .badge-info{background:#a7f3d0;color:#065f46}

  /* Tooltip */
  .med-tooltip{display:none;position:absolute;z-index:200;bottom:calc(100% + 8px);left:0;right:0;background:#1a1410;color:#fff;font-size:11.5px;border-radius:9px;padding:9px 11px;line-height:1.5;box-shadow:0 6px 20px rgba(0,0,0,.25)}
  .med-tooltip::after{content:'';position:absolute;top:100%;left:18px;border:5px solid transparent;border-top-color:#1a1410}
  .med:hover .med-tooltip{display:block}

  /* BOTONES */
  .btn{border:0;border-radius:999px;font-family:'DM Sans',sans-serif;font-weight:700;font-size:13px;padding:9px 18px;cursor:pointer;transition:transform .12s,box-shadow .12s,opacity .12s}
  .btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.12)}
  .btn:active{transform:translateY(0)}
  .btn-primary{background:var(--naranja);color:#fff}
  .btn-secondary{background:#fff;color:var(--naranja);border:1.5px solid var(--naranja)}
  .btn-ghost{background:var(--gris);color:var(--texto-suave);border:1.5px solid var(--borde)}
  .preset-bar{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px;padding-top:14px;border-top:1px solid var(--borde)}

  /* LAYOUT */
  .layout{display:grid;grid-template-columns:1fr 460px;gap:20px;align-items:start}
  @media(max-width:920px){.layout{grid-template-columns:1fr}}
  .preview-wrap{position:sticky;top:20px}
  .preview-label{font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--texto-suave);margin-bottom:8px;padding-left:2px}

  /* RECETA */
  #presc{width:100%;min-height:520px;background:#fff;border:1px solid var(--borde);border-radius:14px;box-shadow:var(--sombra);padding:22px 42px 28px;display:flex;flex-direction:column}
  .presc-head{display:flex;align-items:center;justify-content:center;padding-bottom:8px;margin-bottom:0;gap:24px}
  .presc-head-logo img{height:56px;object-fit:contain;display:block}
  .presc-head-info{text-align:left}
  .presc-sociedad{font-size:12px;font-weight:700;color:var(--naranja);font-style:italic}
  .presc-rut-header{font-size:11px;color:var(--texto-suave);margin-top:1px}
  .presc-servicios{font-size:7px;font-weight:700;color:var(--naranja);text-align:center;letter-spacing:.3px;padding:3px 0 2px;line-height:1.4;text-transform:uppercase;white-space:nowrap;overflow:hidden}
  .presc-divider{height:2px;background:var(--naranja);border-radius:1px;margin-bottom:12px}
  .presc-row{display:flex;gap:18px;margin-bottom:8px;flex-wrap:wrap}
  .presc-field{flex:1;min-width:140px}
  .presc-field-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--naranja);margin-bottom:2px}
  .presc-field-val{font-size:11px;font-weight:600;color:var(--texto);border-bottom:1px solid #ccc;padding-bottom:2px;min-width:120px;display:inline-block}
  .presc-field-val.empty{color:#ccc;font-weight:400;font-style:italic}
  .rp{font-family:'Playfair Display',serif;font-size:14px;font-weight:800;color:var(--naranja);margin:14px 0 4px}
  .indic-label{font-size:11px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--naranja);margin-bottom:8px;display:block}
  #med_list{list-style:none;padding:0;margin:0}
  #med_list li{padding:7px 0 7px 14px;border-left:3px solid var(--naranja-claro);margin-bottom:8px}
  #med_list li strong{font-size:14px;color:var(--texto)}
  #med_list li .indicacion{font-size:12.5px;color:var(--texto-suave);margin-top:1px}
  #med_list .empty-hint{font-size:13px;color:#ccc;font-style:italic;border-left:3px solid #eee;padding:7px 0 7px 14px}
  .firma{margin-top:auto;padding-top:220px;text-align:center}
  .firma-linea{width:55%;height:1px;background:#bbb;margin:0 auto 8px}
  .firma-nombre{font-weight:700;font-size:14px;color:var(--texto)}
  .firma-sub{font-size:11.5px;color:var(--texto-suave);margin-top:2px}
  .presc-perfiles{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
  .presc-perfil-tag{font-size:10.5px;font-weight:700;padding:2px 9px;border-radius:999px;letter-spacing:.3px}
  .presc-perfil-tag.alergico{background:#ede9fe;color:#5b21b6}
  .presc-perfil-tag.hipertenso{background:#dbeafe;color:#1e40af}
  .presc-perfil-tag.diabetico{background:#fef3c7;color:#92400e}
  .presc-perfil-tag.renal{background:#cffafe;color:#164e63}

  .printbar{display:flex;align-items:center;justify-content:flex-end;gap:10px;margin-top:12px}
  .print-status{font-size:12px;color:var(--texto-suave)}

  @page {
    size: letter portrait;
    margin: 0;
  }
  @media print {
    /* Reset total */
    * { box-sizing: border-box; }
    html, body {
      width: 216mm;
      height: 279mm;
      margin: 0 !important;
      padding: 0 !important;
      background: #fff !important;
    }

    /* Ocultar todo excepto la receta */
    body > * { display: none !important; }
    main { display: block !important; background: #fff !important; margin: 0 !important; padding: 0 !important; }
    .layout { display: block !important; }
    .layout > div:first-child { display: none !important; }
    .preview-wrap { display: block !important; margin: 0 !important; padding: 0 !important; position: static !important; }
    .preview-label { display: none !important; }
    .printbar { display: none !important; }

    /* La receta ocupa exactamente la hoja */
    #presc {
      display: flex !important;
      flex-direction: column !important;
      width: 216mm !important;
      height: 279mm !important;
      min-height: 279mm !important;
      border: none !important;
      box-shadow: none !important;
      border-radius: 0 !important;
      background: #fff !important;
      padding: 12mm 14mm 10mm 14mm !important;
      margin: 0 !important;
      overflow: hidden !important;
      page-break-after: avoid !important;
      page-break-inside: avoid !important;
    }

    /* Encabezado */
    .presc-head { padding-bottom: 4px !important; }
    .presc-head-logo img { height: 36px !important; }
    .presc-sociedad { font-size: 11px !important; }
    .presc-rut-header { font-size: 10px !important; }
    .presc-servicios { font-size: 6.5px !important; padding: 3px 0 2px !important; line-height: 1.5 !important; }
    .presc-divider { margin-bottom: 8px !important; height: 1.5px !important; }

    /* Campos paciente */
    .presc-perfiles { margin-bottom: 4px !important; }
    .presc-row { margin-bottom: 2px !important; }
    .presc-field-label { font-size: 8px !important; margin-bottom: 1px !important; }
    .presc-field-val { font-size: 11px !important; min-width: 80px !important; font-weight: 600 !important; }

    /* Medicamentos */
    .rp { font-size: 13px !important; margin: 8px 0 2px !important; }
    .indic-label { font-size: 8px !important; margin-bottom: 4px !important; }
    #med_list li { padding: 4px 0 4px 10px !important; margin-bottom: 4px !important; border-left-width: 2px !important; }
    #med_list li strong { font-size: 11px !important; }
    #med_list li .indicacion { font-size: 9.5px !important; margin-top: 1px !important; }

    /* Firma — 6 espacios más arriba */
    .firma {
      display: block !important;
      visibility: visible !important;
      margin-top: auto !important;
      padding-top: 0 !important;
      padding-bottom: 8mm !important;
    }
    .firma * { visibility: visible !important; display: block !important; }
    .firma-linea { background: #555 !important; width: 50% !important; margin: 0 auto 6px !important; }
    .firma-nombre { font-size: 12px !important; font-weight: 700 !important; text-align: center !important; }
    .firma-sub { font-size: 10px !important; text-align: center !important; color: #555 !important; margin-top: 2px !important; }
  }

</style>
</head>
